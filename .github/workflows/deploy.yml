name: 自动部署到 EdgeOne Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装腾讯云 CLI
        uses: TencentCloud/tencentcloud-cli-action@v1
        with:
          secret-id: ${{ secrets.TENCENT_SECRET_ID }}
          secret-key: ${{ secrets.TENCENT_SECRET_KEY }}

      - name: 部署到 EdgeOne Pages
        run: |
          tcli teo DeployZoneConfigVersion \
            --ZoneId "default-pages-zone" \
            --ProjectName "sports-analytics" \
            --DirectoryPath "./"
