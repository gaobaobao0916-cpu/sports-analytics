name: 自动部署到 EdgeOne Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装腾讯云 CLI
        run: |
          curl -sL https://cli.tools.tencentcloud.com/install.sh | bash
          source ~/.bashrc

      - name: 配置腾讯云凭证
        run: |
          tcli configure set secretId ${{ secrets.TENCENT_SECRET_ID }}
          tcli configure set secretKey ${{ secrets.TENCENT_SECRET_KEY }}

      - name: 部署到 EdgeOne Pages
        run: |
          tcli teo DeployZoneConfigVersion \
            --ZoneId "default-pages-zone" \
            --ProjectName "sports-analytics" \
            --DirectoryPath "./"
